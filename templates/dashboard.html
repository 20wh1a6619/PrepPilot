<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #eef2f3, #dfe9f3);
}

/* CARD STYLE */
.card {
    height: 250px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    border-radius: 15px;
}

.card:hover {
    transform: scale(1.03);
    transition: 0.2s;
}

/* DONUT PROGRESS */
.progress-ring {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: conic-gradient(
        var(--color) calc(var(--value) * 1%), 
        #e6e6e6 0
    );
    display: flex;
    align-items: center;
    justify-content: center;
    margin: auto;
    position: relative;
}

/* INNER WHITE CIRCLE */
.progress-ring::before {
    content: "";
    width: 65px;
    height: 65px;
    background: white;
    border-radius: 50%;
    position: absolute;
}

/* PERCENT TEXT */
.progress-ring span {
    position: relative;
    font-weight: bold;
    font-size: 14px;
}

/* SQUARE GRID FIX */
.job-card-container {
    aspect-ratio: 1 / 1;
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h2>Dashboard</h2>
        <h6 class="text-muted">Track your preparation 🚀</h6>
    </div>
    <a href="/logout" class="btn btn-danger">Logout</a>
</div>

<!-- ADD JOB -->
<div class="card p-3 mb-4 shadow-sm">
<form action="/add-job/{{user_id}}" method="post">
<input name="company" placeholder="Company" class="form-control mb-2">
<input name="role" placeholder="Role" class="form-control mb-2">
<textarea name="jd" class="form-control mb-2"></textarea>
<button class="btn btn-success">Add Job</button>
</form>
</div>

<!-- JOBS -->
<div class="row">
{% for j in jobs %}
<div class="col-md-4 job-card-container">
<div class="card p-3 shadow-sm text-center">

<h5>{{ j[1] }}</h5> <!-- company -->
<p>{{ j[2] }}</p> <!-- role -->

<!-- DONUT PROGRESS -->
<div class="progress-ring"
     style="--value: {{j[3]}}; 
     --color: {% if j[3] < 30 %}#dc3545{% elif j[3] < 70 %}#ffc107{% else %}#28a745{% endif %}">
    <span>{{j[3]}}%</span>
</div>

<a href="/job/{{ j[0] }}" class="btn btn-primary btn-sm">View Details</a> <!-- job_id -->

</div>
</div>
{% endfor %}
</div>

</div>

</body>
</html>
